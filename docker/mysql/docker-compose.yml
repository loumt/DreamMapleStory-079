version: '3.1'
services:
  mysql:
    image: mysql:8.1.0
    command: --default-authentication-plugin=mysql_native_password
    restart: unless-stopped
    container_name: mysql
    ports:
      - 3306:3306
    volumes:
      - ./volumes/mysql:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=123456
      - TZ=Asia/Shanghai